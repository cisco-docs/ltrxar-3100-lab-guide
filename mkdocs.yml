site_name: "LTRXAR-3100 — Hands-On Service-as-Code"
site_description: "Implementing Automation Across Domains: ACI, SD-WAN, and Campus SDA/IOS-XE"
site_author: "Cisco Live"
site_url: "https://cisco-docs.github.io/ltrxar-3100-lab-guide/"
repo_url: "https://github.com/cisco-docs/ltrxar-3100-lab-guide"
repo_name: "cisco-docs/ltrxar-3100-lab-guide"
edit_uri: ""

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: assets/ltrxar_3100_logo.png
  favicon: assets/ltrxar_3100_logo.png
  language: en

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: Source Code Pro

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/cisco.css

plugins:
  - search:
      lang: en
  - awesome-pages
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - print-site:
      add_to_navigation: true
      print_page_title: "Print / Export"
      add_full_urls: false
      enumerate_headings: false
      enumerate_figures: false
      add_table_of_contents: true
      toc_title: "Table of Contents"
      toc_depth: 3
      path_to_pdf: ""

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
    - Overview: overview.md
    - Introduction: introduction.md
  - Labs:
    - Lab 1 — ACI as Code: lab1_aci.md
    - Lab 2 — SD-WAN as Code: lab2_sdwan.md
    - Lab 3 — Catalyst Center as Code: lab3_catc.md
    - Lab 4 — ISE as Code: lab4_ise.md
    - Lab 5 — Multi-Domain Integration: lab5_multidomain.md
  - Conclusion: conclusion.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cisco-docs
      name: Cisco Docs on GitHub
  generator: false

copyright: >
  Copyright &copy; 2025 Cisco Systems, Inc. — LTRXAR-3100 Cisco Live Lab Guide
